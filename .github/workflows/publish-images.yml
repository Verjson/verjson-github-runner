name: publish runner images

# Build the runner images and push them to GHCR so hosts (physical/VPS via the `gha`
# manager, or a GCP VM/MIG via `verjson cloud runner --image`) pull a prebuilt image
# instead of building locally. Multi-arch (amd64 + arm64, arm64 via QEMU emulation).
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: publish-images-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/verjson/gha-runner
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  base:
    runs-on: [self-hosted, docker]
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: images/base.Dockerfile
          # arm64 (via QEMU emulation) only on tagged releases; branch pushes build
          # amd64 only, so routine main-push publishes are fast.
          platforms: ${{ startsWith(github.ref, 'refs/tags/') && env.PLATFORMS || 'linux/amd64' }}
          push: true
          # Every build publishes an immutable sha tag (what cli-cloud pins). The
          # moving/stable tags (:base, :latest, :base-<version>) are pushed only on
          # tagged releases, so a fast amd64 branch build never overwrites a
          # multi-arch release tag with an amd64-only image.
          tags: |
            ${{ env.IMAGE }}:base-${{ github.sha }}
            ${{ startsWith(github.ref, 'refs/tags/') && format('{0}:base', env.IMAGE) || '' }}
            ${{ startsWith(github.ref, 'refs/tags/') && format('{0}:latest', env.IMAGE) || '' }}
            ${{ startsWith(github.ref, 'refs/tags/') && format('{0}:base-{1}', env.IMAGE, github.ref_name) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  kinds:
    needs: base
    runs-on: [self-hosted, docker]
    strategy:
      fail-fast: false
      matrix:
        kind: [rust, node, python, go]
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: images/${{ matrix.kind }}.Dockerfile
          # arm64 (via QEMU emulation) only on tagged releases; branch pushes build
          # amd64 only, so routine main-push publishes are fast.
          platforms: ${{ startsWith(github.ref, 'refs/tags/') && env.PLATFORMS || 'linux/amd64' }}
          push: true
          # Kinds build FROM the base we just pushed; pin the immutable sha tag so a
          # kind is always built on the exact base from the same commit.
          build-args: |
            BASE_IMAGE=${{ env.IMAGE }}:base-${{ github.sha }}
          tags: |
            ${{ env.IMAGE }}:${{ matrix.kind }}-${{ github.sha }}
            ${{ startsWith(github.ref, 'refs/tags/') && format('{0}:{1}', env.IMAGE, matrix.kind) || '' }}
            ${{ startsWith(github.ref, 'refs/tags/') && format('{0}:{1}-{2}', env.IMAGE, matrix.kind, github.ref_name) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

name: publish runner images

# Build the runner images and push them to GHCR so hosts (physical/VPS via the `gha`
# manager, or a GCP VM/MIG via `verjson cloud runner --image`) pull a prebuilt image
# instead of building locally. Multi-arch (amd64 + arm64, arm64 via QEMU emulation).
on:
  push:
    branches: [main]
    paths:
      - 'images/**'
      - 'entrypoint.sh'
      - '.github/workflows/publish-images.yml'
  workflow_dispatch:

concurrency:
  group: publish-images-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/gha-runner
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  base:
    runs-on: [self-hosted, GCP]
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: images/base.Dockerfile
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: |
            ${{ env.IMAGE }}:base
            ${{ env.IMAGE }}:base-${{ github.sha }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  kinds:
    needs: base
    runs-on: [self-hosted, GCP]
    strategy:
      fail-fast: false
      matrix:
        kind: [rust, node, python, go]
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: images/${{ matrix.kind }}.Dockerfile
          platforms: ${{ env.PLATFORMS }}
          push: true
          # Kinds build FROM the base we just pushed; pin the immutable sha tag so a
          # kind is always built on the exact base from the same commit.
          build-args: |
            BASE_IMAGE=${{ env.IMAGE }}:base-${{ github.sha }}
          tags: |
            ${{ env.IMAGE }}:${{ matrix.kind }}
            ${{ env.IMAGE }}:${{ matrix.kind }}-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
